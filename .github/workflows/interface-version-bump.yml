name: Toc Interface & Version Bump

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch WoW build version
        id: version
        run: |
          RAW=$(curl -s http://us.patch.battle.net:1119/wow/versions)

          CN_LINE=$(echo "$RAW" | grep '^cn|')

          VERSION_FULL=$(echo "$CN_LINE" | cut -d'|' -f6)

          VERSION=$(echo "$VERSION_FULL" | cut -d'.' -f1-3)

          echo "Version string: $VERSION"

          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
          SEASON=$(echo "$VERSION" | cut -d'.' -f2)
          MINOR=$(echo "$VERSION" | cut -d'.' -f3)

          SEASON_PAD=$(printf "%02d" "$SEASON")
          MINOR_PAD=$(printf "%02d" "$MINOR")

          INTERFACE="${MAJOR}${SEASON_PAD}${MINOR_PAD}"

          echo "Interface number: $INTERFACE"
          echo "interface=$INTERFACE" >> $GITHUB_OUTPUT

      - name: Update TOC if interface number changed
        id: update
        run: |
          LATEST_INTERFACE_NUMBER="${{ steps.version.outputs.interface }}"
          CURRENT_INTERFACE_NUMBER=$(grep '^## Interface:' All_My_Gold.toc | awk '{print $3}')

          CURRENT_ADDON_VERSION=$(grep '^## Version:' All_My_Gold.toc | awk '{print $3}')

          echo "Current interface: $CURRENT_INTERFACE_NUMBER"
          echo "Latest interface:  $LATEST_INTERFACE_NUMBER"

          if [ "$CURRENT_INTERFACE_NUMBER" = "$LATEST_INTERFACE_NUMBER" ]; then
            echo "Already up to date, nothing to do."
            exit 0
          fi

          perl -i -pe "s/^## Interface: .*/## Interface: $LATEST_INTERFACE_NUMBER/" All_My_Gold.toc

          NEW_ADDON_VERSION=$(echo "$CURRENT_ADDON_VERSION" | perl -pe 's/(\d+)$/$1+1/e')
          perl -i -pe "s/^## Version: .*/## Version: $NEW_ADDON_VERSION/" All_My_Gold.toc
          echo "new_addon_version=$NEW_ADDON_VERSION" >> $GITHUB_OUTPUT

          echo "TOC Interface updated to $LATEST_INTERFACE_NUMBER"
          echo "TOC Version updated to $NEW_ADDON_VERSION"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"   
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          LATEST_INTERFACE_NUMBER="${{ steps.version.outputs.interface }}"
          NEW_ADDON_VERSION="${{ steps.update.outputs.new_addon_version }}"

          git add All_My_Gold.toc
          git commit -m "chore: update interface to $LATEST_INTERFACE_NUMBER, update version to $NEW_ADDON_VERSION"
          git push

          TAG="v${NEW_ADDON_VERSION}-release"
          git tag "$TAG"
          git push origin "$TAG"

          echo "Tagged: $TAG"
